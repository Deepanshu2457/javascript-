<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Todo App</title>

  <style>

    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      background-color: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .todo-container{
      width: 400px;
      background-color: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    h1{
      text-align: center;
      margin-bottom: 20px;
    }

    .input-box{
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .inp{
      flex: 1;
      padding: 10px;
      border: 1px solid gray;
      border-radius: 5px;
      outline: none;
      font-size: 16px;
    }

    .addbtn{
      padding: 10px 15px;
      border: none;
      background-color: black;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    .tasklist{
      list-style: none;
    }

    .task{
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #eeeeee;
      padding: 10px;
      border-radius: 5px;
      margin-bottom: 10px;
    }

    .deletebtn{
      border: none;
      background-color: red;
      color: white;
      padding: 5px 10px;
      border-radius: 5px;
      cursor: pointer;
    }
    .done {
    text-decoration: line-through;
    color: gray;
}

  </style>
</head>
<body>

  <div class="todo-container">

    <h1>Todo App</h1>

    <div class="input-box">
      <input type="text" placeholder="Enter task..." class="inp">

      <button class="addbtn">
        Add
      </button>
    </div>

    <ul class="tasklist">
   
     <!-- <li class="task">
        <span>dep</span>

        <button class="deletebtn">
          Delete
        </button>
      </li> -->

    </ul>

  </div>
<script src="index.js"></script>
</body>
</html>
